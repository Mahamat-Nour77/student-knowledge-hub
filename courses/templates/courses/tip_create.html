{% extends "base.html" %}
{% block content %}
<div style="max-width:620px;margin:0 auto;padding:24px 16px">

  <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:24px">💡 Partager un conseil</h2>

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px">
    <form method="post">
      {% csrf_token %}

      <div style="margin-bottom:18px">
        <label style="display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:6px">Catégorie</label>
        <select name="category" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:.85rem;box-sizing:border-box">
          {% for val,label in category_choices %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
        </select>
      </div>

      <div style="margin-bottom:18px">
        <label style="display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:6px">Titre du conseil *</label>
        <input name="title" required maxlength="200" placeholder="Ex: Comment gérer le stress avant les examens"
               style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:.9rem;box-sizing:border-box">
      </div>

      <div style="margin-bottom:24px">
        <label style="display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:6px">Ton conseil *</label>
        <textarea name="content" required rows="6" placeholder="Partage ton expérience, tes astuces, ce que tu aurais voulu savoir en arrivant..."
                  style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:.9rem;resize:vertical;box-sizing:border-box"></textarea>
      </div>

      <div style="display:flex;gap:12px">
        <button type="submit" style="flex:1;background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.95rem;font-weight:600;cursor:pointer">
          Partager 💡
        </button>
        <a href="{% url 'tips_list' %}" style="padding:12px 20px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem">
          Annuler
        </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
