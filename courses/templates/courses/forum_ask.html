{% extends "base.html" %}
{% block content %}
<div style="max-width:700px;margin:0 auto;padding:24px 16px">

  <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:24px">❓ Poser une question</h2>

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px">
    <form method="post">
      {% csrf_token %}

      <div style="margin-bottom:18px">
        <label style="display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:6px">Titre de la question *</label>
        <input name="title" required maxlength="300" placeholder="Ex: Comment résoudre une intégrale par parties ?"
               style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:.95rem;box-sizing:border-box">
      </div>

      <div style="display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap">
        <div style="flex:1;min-width:140px">
          <label style="display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:6px">Matière</label>
          <select name="subject" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:.85rem;box-sizing:border-box">
            {% for val,label in subject_choices %}
              <option value="{{ val }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div style="flex:1;min-width:140px">
          <label style="display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:6px">Cours lié (optionnel)</label>
          <select name="course_id" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:.85rem;box-sizing:border-box">
            <option value="">-- Aucun --</option>
            {% for c in courses %}
              <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div style="margin-bottom:24px">
        <label style="display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:6px">Détails de ta question *</label>
        <textarea name="content" required rows="6" placeholder="Explique ta question en détail. Plus c'est précis, plus tu auras de bonnes réponses !"
                  style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:.9rem;resize:vertical;box-sizing:border-box"></textarea>
      </div>

      <div style="display:flex;gap:12px">
        <button type="submit" style="flex:1;background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.95rem;font-weight:600;cursor:pointer">
          Publier la question 🚀
        </button>
        <a href="{% url 'forum_list' %}" style="padding:12px 20px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--muted);text-decoration:none;font-size:.9rem">
          Annuler
        </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
